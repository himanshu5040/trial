<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Self-Correcting Reasoning System</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #f5efe4;
            --surface: rgba(255, 252, 246, 0.92);
            --text: #14213d;
            --muted: #5e6a7d;
            --accent: #d97706;
            --border: rgba(20, 33, 61, 0.1);
            --shadow: 0 24px 60px rgba(20, 33, 61, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Source Sans 3", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(239, 196, 126, 0.65), transparent 32%),
                radial-gradient(circle at top right, rgba(150, 203, 255, 0.5), transparent 28%),
                linear-gradient(180deg, #f8f3eb 0%, #efe6d5 100%);
        }

        .register-card {
            width: min(420px, 90%);
            padding: 36px;
            border-radius: 28px;
            background: rgba(255, 252, 246, 0.92);
            border: 1px solid rgba(20, 33, 61, 0.1);
            box-shadow: 0 24px 60px rgba(20, 33, 61, 0.12);
            backdrop-filter: blur(16px);
        }

        .eyebrow {
            margin: 0 0 10px;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            font-size: 0.78rem;
            font-weight: 700;
            color: #8a3b12;
        }

        h1 {
            margin: 0 0 10px;
            font-family: "Space Grotesk", sans-serif;
            font-size: 2.2rem;
        }

        p {
            color: var(--muted);
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 18px;
            border-radius: 14px;
            border: 1px solid rgba(20, 33, 61, 0.12);
            background: rgba(255, 255, 255, 0.9);
            font: inherit;
            outline: none;
        }

        input:focus {
            border-color: rgba(217, 119, 6, 0.5);
            box-shadow: 0 0 0 4px rgba(217, 119, 6, 0.12);
        }

        button {
            width: 100%;
            padding: 14px;
            border: 0;
            border-radius: 16px;
            background: linear-gradient(135deg, #d97706, #f59e0b);
            color: white;
            font-family: "Space Grotesk", sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 18px 30px rgba(217, 119, 6, 0.22);
        }

        button:hover {
            transform: translateY(-2px);
        }

        .error {
            margin-bottom: 16px;
            padding: 12px;
            border-radius: 12px;
            background: #fff1f1;
            color: #a12626;
            border: 1px solid rgba(161, 38, 38, 0.15);
        }

        .auth-switch {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }

        .auth-switch a {
            flex: 1;
            padding: 10px 14px;
            border-radius: 999px;
            border: 1px solid rgba(20, 33, 61, 0.12);
            color: var(--muted);
            text-align: center;
            text-decoration: none;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.72);
        }

        .auth-switch a.active {
            color: white;
            border-color: transparent;
            background: linear-gradient(135deg, #d97706, #f59e0b);
            box-shadow: 0 12px 24px rgba(217, 119, 6, 0.22);
        }

        .login-link {
            margin-top: 18px;
            text-align: center;
            font-size: 0.95rem;
            color: var(--muted);
        }

        .login-link a {
            color: var(--accent);
            font-weight: 700;
            text-decoration: none;
        }

        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="register-card">
    <p class="eyebrow">LLM Reasoning</p>
    <h1>Sign Up</h1>
    <p>Create your account for the Self-Correcting Reasoning Dashboard</p>

    <div class="auth-switch">
        <a href="{{ url_for('login') }}">Sign In</a>
        <a href="{{ url_for('register') }}" class="active">Sign Up</a>
    </div>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <label for="username">Username</label>
        <input type="text" name="username" id="username" placeholder="Choose username" required>

        <label for="password">Password</label>
        <input type="password" name="password" id="password" placeholder="Create password" required>

        <label for="confirm_password">Confirm Password</label>
        <input type="password" name="confirm_password" id="confirm_password" placeholder="Confirm password" required>

        <button type="submit">Register</button>

        <div class="login-link">
            Already have an account?
            <a href="{{ url_for('login') }}">Sign in here</a>
        </div>
    </form>
</div>

</body>
</html>
